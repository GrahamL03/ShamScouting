<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShamScouting Receiver & Scanner Utility</title>
  
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <style>
    :root {
      --bg-color: #121212;
      --card-bg: #1e1e1e;
      --text-color: #ffffff;
      --accent-red: #d32f2f;
      --accent-blue: #1976d2;
      --success-green: #388e3c;
      --missing-red: #b71c1c;
      --border-color: #333;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      height: 100vh;
      overflow: hidden;
    }

    /* Flash Overlay for Scan Feedback */
    #flash-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.1s ease-in-out;
    }

    #flash-overlay.flash-success {
      background-color: rgba(76, 175, 80, 0.75);
      opacity: 1;
    }

    #flash-overlay.flash-error {
      background-color: rgba(244, 67, 54, 0.75);
      opacity: 1;
    }

    /* Header & Controls */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: var(--card-bg);
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
    }

    h1 {
      font-size: 1.4rem;
      color: #fff;
    }

    .export-btn {
      background-color: var(--success-green);
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      transition: background-color 0.2s, transform 0.1s;
    }

    .export-btn:hover {
      background-color: #2e7d32;
    }

    .export-btn:active {
      transform: scale(0.98);
    }

    /* Main Dashboard Layout */
    .dashboard {
      display: grid;
      grid-template-columns: 350px 1fr;
      gap: 15px;
      flex: 1;
      min-height: 0; /* Helps child scrollbars behave */
    }

    .left-panel {
      display: flex;
      flex-direction: column;
      gap: 15px;
      min-height: 0;
    }

    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 15px;
      display: flex;
      flex-direction: column;
    }

    /* Scanner Region */
    #scanner-card {
      align-items: center;
    }

    #reader {
      width: 100%;
      border-radius: 6px;
      overflow: hidden;
      background: #000;
    }

    /* Live Queue Region */
    .queue-card {
      flex: 1;
      overflow-y: auto;
    }

    .queue-card h2 {
      font-size: 1.1rem;
      margin-bottom: 10px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 5px;
    }

    .queue-list {
      list-style: none;
    }

    .queue-item {
      background-color: #2a2a2a;
      padding: 8px 12px;
      border-radius: 4px;
      margin-bottom: 8px;
      font-size: 0.9rem;
      display: flex;
      justify-content: space-between;
      border-left: 4px solid var(--accent-blue);
    }

    .queue-item.red-slot { border-left-color: var(--accent-red); }
    .queue-item.blue-slot { border-left-color: var(--accent-blue); }

    /* Matrix HUD Region */
    .matrix-card {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .matrix-card h2 {
      font-size: 1.1rem;
      margin-bottom: 10px;
    }

    .matrix-container {
      flex: 1;
      overflow: auto;
      border: 1px solid var(--border-color);
    }

    table.hud-matrix {
      width: 100%;
      border-collapse: collapse;
      text-align: center;
      font-size: 0.85rem;
    }

    table.hud-matrix th, table.hud-matrix td {
      border: 1px solid var(--border-color);
      padding: 6px;
    }

    table.hud-matrix th {
      background-color: #252525;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    th.red-hdr { color: #ef5350; }
    th.blue-hdr { color: #42a5f5; }

    .cell-missing {
      background-color: rgba(183, 28, 28, 0.4);
      color: #ffcdd2;
    }

    .cell-scanned {
      background-color: rgba(56, 142, 60, 0.5);
      color: #c8e6c9;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div id="flash-overlay"></div>

  <header>
    <h1>ShamScouting Standalone Receiver Utility</h1>
    <button class="export-btn" onclick="exportToCSV()">EXPORT TO USB (.CSV)</button>
  </header>

  <div class="dashboard">
    <div class="left-panel">
      <div class="card" id="scanner-card">
        <div id="reader"></div>
      </div>

      <div class="card queue-card">
        <h2>Recent Activity Log</h2>
        <ul id="queue-list" class="queue-list">
          </ul>
      </div>
    </div>

    <div class="card matrix-card">
      <h2>Scouting Completeness Matrix</h2>
      <div class="matrix-container">
        <table class="hud-matrix">
          <thead>
            <tr>
              <th>Match</th>
              <th class="red-hdr">Red 1</th>
              <th class="red-hdr">Red 2</th>
              <th class="red-hdr">Red 3</th>
              <th class="blue-hdr">Blue 1</th>
              <th class="blue-hdr">Blue 2</th>
              <th class="blue-hdr">Blue 3</th>
            </tr>
          </thead>
          <tbody id="matrix-body">
            </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // --- SCHEMA DEFINTION (32 Fields) ---
    const HEADERS = [
      "Match","Team","AllianceSlot","Taxi","AutoL1","AutoL2","AutoL3","AutoL4",
      "AutoAlgaeRem","AutoProc","AutoNet","AutoMiss","TeleL1","TeleL2","TeleL3",
      "TeleL4","TeleAlgaeRem","TeleProc","TeleNet","HumanPref","FacedDef",
      "PlayedDef","DefRating","Barge","ClimbSpeed","PartnerClimb","DriverSkill",
      "Died","Tipped","Fouls","Tags","Notes"
    ];

    const SLOTS = ["Red 1", "Red 2", "Red 3", "Blue 1", "Blue 2", "Blue 3"];
    
    // In-memory data store
    let records = [];
    let recentQueue = [];
    let html5QrcodeScanner = null;
    let isProcessingScan = false;

    // --- AUDIO SYNTHESIS FOR FEEDBACK ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playAudioFeedback(type) {
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === 'success') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime); // A5 (High Beep)
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.15);
      } else {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime); // Low Buzz
        gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
      }
    }

    function triggerVisualFeedback(type) {
      const overlay = document.getElementById('flash-overlay');
      overlay.className = type === 'success' ? 'flash-success' : 'flash-error';
      setTimeout(() => {
        overlay.className = '';
      }, 250);
    }

    // --- DATA HANDLING & STORAGE ---
    function loadSavedRecords() {
      const stored = localStorage.getItem('shamscouting_records');
      if (stored) {
        try {
          records = JSON.parse(stored);
        } catch(e) {
          console.error("Error reading saved records:", e);
          records = [];
        }
      }
      renderMatrix();
    }

    function saveRecords() {
      localStorage.setItem('shamscouting_records', JSON.stringify(records));
      renderMatrix();
    }

    function parsePipeDelimitedPayload(payload) {
      const tokens = payload.split('|');
      if (tokens.length !== HEADERS.length) {
        throw new Error(`Invalid token count. Expected ${HEADERS.length}, got ${tokens.length}`);
      }

      const rowObj = {};
      HEADERS.forEach((header, idx) => {
        rowObj[header] = tokens[idx].trim();
      });

      return rowObj;
    }

    function handleDecodedText(decodedText) {
      if (isProcessingScan) return;
      isProcessingScan = true;

      try {
        const dataRow = parsePipeDelimitedPayload(decodedText);
        
        // Duplicate Detection Check
        const isDuplicate = records.some(r => 
          parseInt(r.Match) === parseInt(dataRow.Match) && 
          r.AllianceSlot.toLowerCase() === dataRow.AllianceSlot.toLowerCase()
        );

        if (isDuplicate) {
          playAudioFeedback('error');
          triggerVisualFeedback('error');
          console.warn("Duplicate entry detected for this Match and Alliance Slot.");
        } else {
          // Success Path
          records.push(dataRow);
          saveRecords();
          addToQueue(dataRow);
          
          playAudioFeedback('success');
          triggerVisualFeedback('success');
        }
      } catch (err) {
        console.error("Payload Parse Error:", err);
        playAudioFeedback('error');
        triggerVisualFeedback('error');
      }

      // Brief cooldown to avoid double firing on same QR code
      setTimeout(() => {
        isProcessingScan = false;
      }, 1500);
    }

    // --- HUD MATRIX UI ---
    function initMatrix() {
      const tbody = document.getElementById('matrix-body');
      tbody.innerHTML = '';

      for (let match = 1; match <= 100; match++) {
        const tr = document.createElement('tr');
        
        const tdMatch = document.createElement('td');
        tdMatch.textContent = match;
        tr.appendChild(tdMatch);

        SLOTS.forEach(slot => {
          const td = document.createElement('td');
          td.id = `cell-${match}-${slot.replace(' ', '')}`;
          td.className = 'cell-missing';
          td.textContent = '—';
          tr.appendChild(td);
        });

        tbody.appendChild(tr);
      }
    }

    function renderMatrix() {
      // Clear cells back to default state
      for (let match = 1; match <= 100; match++) {
        SLOTS.forEach(slot => {
          const cell = document.getElementById(`cell-${match}-${slot.replace(' ', '')}`);
          if (cell) {
            cell.className = 'cell-missing';
            cell.textContent = '—';
          }
        });
      }

      // Update state based on stored records
      records.forEach(rec => {
        const matchNum = parseInt(rec.Match);
        if (matchNum >= 1 && matchNum <= 100) {
          // Standardize slot string comparison
          const formattedSlot = rec.AllianceSlot.replace(/\s+/g, '');
          const cell = document.getElementById(`cell-${matchNum}-${formattedSlot}`);
          if (cell) {
            cell.className = 'cell-scanned';
            cell.textContent = rec.Team || '✓';
          }
        }
      });
    }

    // --- RECENT QUEUE LOG ---
    function addToQueue(dataRow) {
      recentQueue.unshift(dataRow);
      if (recentQueue.length > 5) recentQueue.pop();

      const queueList = document.getElementById('queue-list');
      queueList.innerHTML = '';

      recentQueue.forEach(item => {
        const li = document.createElement('li');
        const isRed = item.AllianceSlot.toLowerCase().includes('red');
        li.className = `queue-item ${isRed ? 'red-slot' : 'blue-slot'}`;
        
        const timestamp = new Date().toLocaleTimeString();
        li.innerHTML = `
          <span><strong>M${item.Match} (${item.AllianceSlot}):</strong> Team ${item.Team}</span>
          <span style="opacity: 0.6; font-size: 0.8rem;">${timestamp}</span>
        `;
        queueList.appendChild(li);
      });
    }

    // --- EXPORT FUNCTIONALITY ---
    function exportToCSV() {
      if (records.length === 0) {
        alert("No records to export.");
        return;
      }

      const csvContent = Papa.unparse({
        fields: HEADERS,
        data: records
      });

      // Find max match number for dynamic naming
      const maxMatch = records.reduce((max, r) => Math.max(max, parseInt(r.Match) || 1), 1);
      const filename = `export_matches_1-${maxMatch}.csv`;

      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      
      link.setAttribute('href', url);
      link.setAttribute('download', filename);
      link.style.visibility = 'hidden';
      
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // --- SCANNER INITIALIZATION ---
    function startScanner() {
      html5QrcodeScanner = new Html5Qrcode("reader");
      
      const config = { 
        fps: 15, 
        qrbox: { width: 250, height: 250 },
        aspectRatio: 1.0 
      };

      html5QrcodeScanner.start(
        { facingMode: "environment" }, 
        config, 
        handleDecodedText
      ).catch(err => {
        console.warn("Unable to start environment camera, attempting front/default camera...", err);
        // Fallback to any available camera
        html5QrcodeScanner.start(
          {}, 
          config, 
          handleDecodedText
        ).catch(e => console.error("Camera start failed entirely:", e));
      });
    }

    // --- APP INIT ---
    window.addEventListener('DOMContentLoaded', () => {
      initMatrix();
      loadSavedRecords();
      startScanner();
    });
  </script>
</body>
</html>
